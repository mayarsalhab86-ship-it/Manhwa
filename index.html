<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>الروح العذراء - RABINC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0b0719, #1e1245, #2a1b5e, #150e2b);
            background-size: 300% 300%;
            animation: moveBackground 12s ease infinite;
            color: #ffffff;
            min-height: 100vh;
        }

        @keyframes moveBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .top-alert {
            background: linear-gradient(90deg, #00ffff, #00ff9d);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #0b0719;
            font-weight: bold;
            font-size: 14px;
        }

        .close-btn {
            cursor: pointer;
            font-size: 18px;
        }

        header {
            background: rgba(11, 7, 25, 0.8);
            padding: 15px;
            border-bottom: 1px solid #00ffff;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1300px;
            margin: 0 auto;
            gap: 10px;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            display: flex;
            flex-direction: row;
            direction: ltr;
            cursor: pointer;
            position: relative;
        }

        .logo span {
            display: inline-block;
            transition: transform 0.5s ease, opacity 0.3s ease;
            animation: colorChange 6s linear infinite;
            animation-delay: calc(0.1s * var(--i));
        }

        @keyframes colorChange {
            0% { color: #00ff00; }      /* أخضر */
            16% { color: #a020f0; }      /* بنفسجي */
            32% { color: #000000; }      /* أسود */
            48% { color: #ff0000; }      /* أحمر */
            64% { color: #0000ff; }      /* أزرق */
            80% { color: #ff69b4; }      /* زهري */
            100% { color: #00ff00; }     /* أخضر */
        }

        /* تأثير التناثر - كل حرف يطير في اتجاه */
        .logo.scatter span {
            animation: scatterLetter 0.8s ease forwards;
        }

        @keyframes scatterLetter {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x, 200px), var(--y, -150px)) rotate(360deg);
                opacity: 0;
            }
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 30px;
            border: none;
            background: #1e1738;
            color: white;
            border: 1px solid #00ffff;
            font-size: 14px;
        }

        .user-actions {
            display: flex;
            gap: 15px;
        }

        .user-actions i {
            color: #00ffff;
            font
